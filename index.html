<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicShare</title>
  <link rel="stylesheet" href="https://github.com/Spacklight/music-share-app/blob/main/CSS/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <span class="logo-icon">♪</span>
      <span class="logo-text">Music<span class="logo-accent">Share</span></span>
    </div>

    <div class="nav-links">
      <a href="#" class="nav-link active">Home</a>
      <a href="#" class="nav-link">Explore</a>
      <a href="#" class="nav-link">My Library</a>
      <a href="#" class="nav-link">Playlists</a>
    </div>

    <div class="nav-right">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search for music...">
      </div>
      <button class="icon-btn" title="Messages">✉️</button>
      <button class="icon-btn" title="Notifications">🔔</button>
      <div class="avatar" id="userAvatar" title="Login / Account"></div>
      <span id="authStatus" class="auth-status">Not logged in</span>
    </div>
  </nav>

  <main class="container">

    <section class="hero">
      <div class="hero-content">
        <h1>Share &amp; Discover Music</h1>
        <p>Upload your tracks &amp; download your favorites!</p>
        <div class="hero-buttons">
          <button class="btn btn-primary" id="uploadBtn">
            <span>⬆️</span> Upload MP3
          </button>
          <button class="btn btn-secondary" id="downloadBtn">
            <span>⬇️</span> Download Tracks
          </button>
        </div>
      </div>
    </section>

  </main>

  <!-- Hidden file input used by Upload button -->
  <input type="file" id="fileInput" accept=".mp3,audio/mpeg" style="display:none">

  <!-- ===== Auth Modal ===== -->
  <div class="modal-overlay" id="authModalOverlay">
    <div class="modal">
      <div class="modal-tabs">
        <button class="modal-tab active" id="loginTab">Login</button>
        <button class="modal-tab" id="registerTab">Register</button>
      </div>

      <div class="modal-body">
        <input type="text" id="authUsername" placeholder="Username">
        <input type="password" id="authPassword" placeholder="Password">
        <p class="modal-error" id="authError"></p>
        <button class="btn btn-primary modal-submit" id="authSubmitBtn">Login</button>
      </div>

      <button class="modal-close" id="authModalClose">✕</button>
    </div>
  </div>

  <!-- ===== Upload Details Modal (title/artist before uploading) ===== -->
  <div class="modal-overlay" id="uploadModalOverlay">
    <div class="modal">
      <h3 class="modal-title">Track Details</h3>
      <div class="modal-body">
        <input type="text" id="uploadTitle" placeholder="Track title">
        <input type="text" id="uploadArtist" placeholder="Artist name">
        <p class="modal-error" id="uploadError"></p>
        <button class="btn btn-primary modal-submit" id="uploadSubmitBtn">Upload</button>
      </div>
      <button class="modal-close" id="uploadModalClose">✕</button>
    </div>
  </div>

  <script src="https://github.com/Spacklight/music-share-app/blob/main/JS/config.js"></script>
  <script src="https://github.com/Spacklight/music-share-app/blob/main/JS/auth.js"></script>
  <script src="https://github.com/Spacklight/music-share-app/blob/main/JS/github-api.js"></script>
  <script src="https://github.com/Spacklight/music-share-app/blob/main/JS/app.js"></script>
</body>
</html>
