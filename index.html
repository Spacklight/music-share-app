<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicShare</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <span class="logo-icon">♪</span>
      <span class="logo-text">Music<span class="logo-accent">Share</span></span>
    </div>

    <div class="nav-links">
      <a href="#" class="nav-link active">Home</a>
      <a href="#" class="nav-link">Explore</a>
      <a href="#" class="nav-link">My Library</a>
      <a href="#" class="nav-link">Playlists</a>
    </div>

    <div class="nav-right">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search for music...">
      </div>
      <button class="icon-btn" title="Messages">✉️</button>
      <button class="icon-btn" title="Notifications">🔔</button>
      <div class="avatar" id="userAvatar" title="Login / Account"></div>
    </div>
  </nav>

  <main class="container">

    <section class="hero">
      <div class="hero-content">
        <h1>Share &amp; Discover Music</h1>
        <p>Upload your tracks &amp; download your favorites!</p>
        <div class="hero-buttons">
          <button class="btn btn-primary" id="uploadBtn">
            <span>⬆️</span> Upload MP3
          </button>
          <button class="btn btn-secondary" id="downloadBtn">
            <span>⬇️</span> Download Tracks
          </button>
        </div>
      </div>
    </section>

  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
